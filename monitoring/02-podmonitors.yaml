# =============================================================================
# PodMonitor — tells Prometheus to scrape JMX metrics (port 7778) from ALL
# Confluent Platform pods. Apply to BOTH clusters:
#
#   kubectl --context=edge apply -f monitoring/02-podmonitors.yaml -n cp-edge
#   kubectl --context=hub  apply -f monitoring/02-podmonitors.yaml -n cp-hub
#
# Modeled on confluentinc/jmx-monitoring-stacks .../cfk/pm-confluent.yaml so the
# label scheme matches the CfK Grafana dashboards (monitoring/grafana-dashboards/):
#   - jobLabel: platform.confluent.io/type  → sets job=kafka/schemaregistry/
#     connect/kraftcontroller/controlcenter (dashboards filter job="kafka" etc.)
#   - podTargetLabels carries app/type/clusterId onto the metrics
#   - port "prometheus" is the CfK metrics port (7778)
# A single selector (confluent-platform Exists) matches every CP component pod.
# =============================================================================

apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: pm-confluent
  labels:
    monitoring: confluent
spec:
  jobLabel: platform.confluent.io/type
  podTargetLabels:
    - app
    - clusterId
    - confluent-platform
    - platform.confluent.io/type
    - type
  podMetricsEndpoints:
    - port: prometheus
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
  selector:
    matchExpressions:
      - key: confluent-platform
        operator: Exists
  namespaceSelector:
    any: true
