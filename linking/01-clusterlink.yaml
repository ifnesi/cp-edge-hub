# =============================================================================
# ClusterLink — applied on the HUB EKS cluster (destination)
#
# Before applying:
#   1. Retrieve Edge bootstrap IPs from the Edge cluster:
#        kubectl --context=<edge-ctx> get svc -n cp-edge | grep lb
#      Then fill in EDGE_BOOTSTRAP below (comma-separated broker NLB FQDNs).
#
#   2. Create the edge-ca-cert secret on Hub (contains Edge's CA cert):
#        kubectl --context=<hub-ctx> create secret generic edge-ca-cert \
#          --from-file=cacerts.pem=./certs/cacerts.pem \
#          -n cp-hub
#
#   3. Create the edge-cluster-link-credential secret on Hub:
#        kubectl --context=<hub-ctx> create secret generic edge-cluster-link-credential \
#          --from-file=plain.txt=./linking/clusterlink-client.txt \
#          -n cp-hub
#      Where clusterlink-client.txt contains:
#          username=cluster-link
#          password=clusterlink-secret
#
#   4. Ensure the cluster-link user exists on Edge with the correct ACLs
#      (see scripts/03-edge-acls.sh).
#
#   NOTE: Steps 2 and 3 are already handled by scripts/02-create-secrets-hub.sh.
#   Also run scripts/06-cluster-dns.sh first so Hub pods can resolve the Edge
#   broker FQDNs in bootstrapEndpoint below.
# =============================================================================

apiVersion: platform.confluent.io/v1beta1
kind: ClusterLink
metadata:
  name: edge-to-hub
  namespace: cp-hub
spec:
  # Destination cluster — the Hub Kafka managed by CfK in this namespace
  destinationKafkaClusterRef:
    name: kafka
    namespace: cp-hub

  # Source cluster — the Edge Kafka (external, reached via NLB FQDNs)
  sourceKafkaCluster:
    # Replace with actual Edge NLB FQDNs once deployed.
    # Using brokerPrefix "b" and domain "edge.kafka.demo":
    #   b0.edge.kafka.demo:9092, b1.edge.kafka.demo:9092, b2.edge.kafka.demo:9092
    bootstrapEndpoint: "b0.edge.kafka.demo:9092,b1.edge.kafka.demo:9092,b2.edge.kafka.demo:9092"
    authentication:
      type: plain
      jaasConfigSecretRef:
        name: edge-cluster-link-credential
        key: plain.txt
    tls:
      enabled: true
      secretRef: edge-ca-cert

  # Link-level configs
  configs:
    acl.sync.enable: "false"           # set to "true" if you want ACLs mirrored
    acl.sync.ms: "5000"
    consumer.offset.sync.enable: "true"
    consumer.offset.sync.ms: "30000"
    consumer.offset.group.filters: |
      {"groupFilters": [{"name": "*", "patternType": "WILDCARD", "filterType": "INCLUDE"}]}

  # ==========================================================================
  # Mirror topics — exact topic names, no prefix, replicated Edge → Hub.
  # These are the only topics mirrored; all other Edge topics are excluded.
  # ==========================================================================
  mirrors:
    - topicName: "siem_poc_dns_logs-aggregate"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_fortigate_logs-event-system"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_fortigate_logs-event-user"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_fortigate_logs-event-vpn"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_fortigate_logs-traffic-forward"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_fortigate_logs-traffic-local"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_fortigate_logs-utm-dns"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_fortigate_logs-utm-ips"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_fortigate_logs-utm-virus"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_fortigate_logs-utm-webfilter"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_paloalto_logs-auth-auth"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_paloalto_logs-globalprotect-globalprotect"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_paloalto_logs-system-general"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_paloalto_logs-threat-spyware"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_paloalto_logs-threat-url"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_paloalto_logs-threat-virus"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_paloalto_logs-threat-vulnerability"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_paloalto_logs-traffic-deny"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_paloalto_logs-traffic-end"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_paloalto_logs-traffic-start"
      state: ACTIVE
      replicationFactor: 3

    - topicName: "siem_poc_windows_eventlog_logs"
      state: ACTIVE
      replicationFactor: 3

---
