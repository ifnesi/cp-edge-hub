apiVersion: platform.confluent.io/v1beta1
kind: ControlCenter
metadata:
  name: controlcenter
  namespace: cp-hub
spec:
  replicas: 1

  # Instance identity — used as the internal-topic prefix (_confluent-controlcenter_<name>),
  # NOT the Kafka cluster display name in the UI.
  name: hub.cluster

  # -------------------------------------------------------------------------
  # Kafka cluster display name in the C3 UI — the <name> token (dot-free) in
  # the property key becomes the tile label. Must match bootstrapEndpoint in
  # dependencies.kafka so C3 renames the existing cluster, not add a second tile.
  # -------------------------------------------------------------------------
  configOverrides:
    server:
      - confluent.controlcenter.kafka.Hub.bootstrap.servers=kafka.cp-hub.svc.cluster.local:9071
      # Same CFK omission as edge — Hub.* named-cluster client defaults to PLAINTEXT without these.
      - confluent.controlcenter.kafka.Hub.security.protocol=SASL_PLAINTEXT
      - confluent.controlcenter.kafka.Hub.sasl.mechanism=PLAIN
      - confluent.controlcenter.kafka.Hub.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${file:/mnt/secrets/credential/plain.txt:username}" password="${file:/mnt/secrets/credential/plain.txt:password}";
      # See edge/05-controlcenter.yaml for rationale. Same 1 TiB brokers, same threshold.
      - confluent.controlcenter.disk.skew.warning.min.bytes=10737418240

  # -------------------------------------------------------------------------
  # Next-generation Control Center (C3++), 2.5.0 — a separately-versioned
  # product. It no longer uses the _confluent-metrics topic / monitoring
  # interceptors; instead it bundles Prometheus + Alertmanager (as sidecars in
  # this pod) and ingests metrics that each CP component publishes via its
  # dependencies.metricsClient. Image tags MUST match across all three.
  # -------------------------------------------------------------------------
  image:
    application: docker.io/confluentinc/cp-enterprise-control-center-next-gen:2.5.0
    init: docker.io/confluentinc/confluent-init-container:3.2.0

  # Pod-level resources cover all three containers (C3 + Prometheus + Alertmanager).
  # Kept small so the pod fits a broker node alongside a broker + SR/Connect pod.
  dataVolumeCapacity: 50Gi
  storageClass:
    name: gp3

  podTemplate:
    resources:
      requests:
        cpu: "500m"
        memory: 3Gi
      limits:
        cpu: "3"
        memory: 6Gi
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - broker

  # Dedicated TLS secret — includes the C3 NLB hostname as a SAN so the browser
  # SNI check passes. Created/refreshed by scripts/09-refresh-c3-tls.sh.
  tls:
    secretRef: tls-controlcenter

  externalAccess:
    type: loadBalancer
    loadBalancer:
      domain: hub.kafka.demo
      port: 9021
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

  # -------------------------------------------------------------------------
  # Bundled metrics backend — Prometheus + Alertmanager (basic auth, internal).
  # The PVCs default to the gp3 StorageClass.
  # -------------------------------------------------------------------------
  services:
    prometheus:
      image: docker.io/confluentinc/cp-enterprise-prometheus:2.5.0
      authentication:
        type: basic
        basic:
          secretRef: prometheus-credentials
      pvc:
        dataVolumeCapacity: 50Gi
    alertmanager:
      image: docker.io/confluentinc/cp-enterprise-alertmanager:2.5.0
      authentication:
        type: basic
        basic:
          secretRef: alertmanager-credentials

  # -------------------------------------------------------------------------
  # Dependencies
  #   prometheusClient / alertManagerClient — C3 reads from its own bundled
  #     metrics services (basic auth, internal http).
  #   kafka / schemaRegistry / connect — Hub cluster management (topics, schemas,
  #     and the Splunk Sink connector, created later from the C3 UI).
  # -------------------------------------------------------------------------
  dependencies:
    prometheusClient:
      url: http://controlcenter.cp-hub.svc.cluster.local:9090
      authentication:
        type: basic
        basic:
          secretRef: prometheus-client-creds
    alertManagerClient:
      url: http://controlcenter.cp-hub.svc.cluster.local:9093
      authentication:
        type: basic
        basic:
          secretRef: alertmanager-client-creds

    kafka:
      bootstrapEndpoint: kafka.cp-hub.svc.cluster.local:9071
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
      tls:
        enabled: false

    schemaRegistry:
      url: https://schemaregistry.cp-hub.svc.cluster.local:8081
      tls:
        enabled: true
        secretRef: tls-kafka

    # Kafka Connect (Splunk Sink plugin) — managed from the C3 UI.
    connect:
      - name: connect
        url: http://connect.cp-hub.svc.cluster.local:8083
        tls:
          enabled: false
