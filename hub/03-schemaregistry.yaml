apiVersion: platform.confluent.io/v1beta1
kind: SchemaRegistry
metadata:
  name: schemaregistry
  namespace: cp-hub
spec:
  replicas: 2

  image:
    application: docker.io/confluentinc/cp-schema-registry:8.2.1
    init: docker.io/confluentinc/confluent-init-container:3.2.0

  # License — required if you have a Confluent Platform subscription.
  # Install via scripts/07-install-license.sh. If you don't have a license,
  # comment out the block below (clusters run in trial mode — some features have 30-day limits).
  license:
    secretRef: confluent-license

  # Modest request; pinned to broker nodes (controller nodes are full). See edge.
  podTemplate:
    resources:
      requests:
        cpu: "500m"
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - broker

  tls:
    secretRef: tls-kafka

  externalAccess:
    type: loadBalancer
    loadBalancer:
      domain: hub.kafka.demo
      port: 8081
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

  # Enable the Schema Exporter (Schema Linking) REST API for symmetry with Edge.
  configOverrides:
    server:
      - resource.extension.class=io.confluent.schema.exporter.SchemaExporterResourceExtension
      - kafkastore.update.handlers=io.confluent.schema.exporter.storage.SchemaExporterUpdateHandler
      # Required to encrypt the exporter's stored destination credentials.
      - password.encoder.secret=cp-edge-hub-demo-encoder-secret

  metrics:
    prometheus:
      rules:
        - pattern: ".*"

  dependencies:
    kafka:
      bootstrapEndpoint: kafka.cp-hub.svc.cluster.local:9071
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
      tls:
        enabled: false
