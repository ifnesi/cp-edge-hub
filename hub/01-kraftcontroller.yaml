apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: cp-hub
spec:
  # Must be a URL-safe base64 16-byte UUID (22 chars) — see edge controller note.
  clusterID: 655Nn-KLQnGhaOyEoMoG9A

  replicas: 3
  oneReplicaPerNode: true

  image:
    application: docker.io/confluentinc/cp-server:8.2.1
    init: docker.io/confluentinc/confluent-init-container:3.2.0

  # License — required if you have a Confluent Platform subscription.
  # Install via scripts/07-install-license.sh. If you don't have a license,
  # comment out the block below (clusters run in trial mode — some features have 30-day limits).
  license:
    secretRef: confluent-license

  dataVolumeCapacity: 50Gi
  dataVolumeStorageClass: gp3

  # CPU request stays below m5.large allocatable (~1930m) so the pod schedules.
  resources:
    requests:
      cpu: "1500m"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 4Gi

  podTemplate:
    nodeSelector:
      role: controller
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true

  # Register with the next-gen Control Center's bundled Prometheus (basic auth).
  dependencies:
    metricsClient:
      url: http://controlcenter.cp-hub.svc.cluster.local:9090
      authentication:
        type: basic
        basic:
          secretRef: prometheus-client-creds

  authorization:
    type: simple
    superUsers:
      - User:kafka
      - User:admin

  listeners:
    controller:
      tls:
        enabled: false
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential

  configOverrides:
    server:
      - authorizer.class.name=io.confluent.kafka.security.authorizer.ConfluentServerAuthorizer
      - confluent.authorizer.access.rule.providers=KRAFT_ACL
      - allow.everyone.if.no.acl.found=false

  metrics:
    prometheus:
      rules:
        - pattern: ".*"

  telemetry:
    global: false
