# Schema Registry client configuration — Edge cluster
# Used with confluent-kafka-python SerializingProducer / DeserializingConsumer.

schema.registry.url=https://schemaregistry.edge.kafka.demo:8081
schemaRegistryURL=https://schemaregistry.edge.kafka.demo:8081

# Basic auth
schema.registry.basic.auth.credentials.source=USER_INFO
schema.registry.basic.auth.user.info=admin:admin-secret

# TLS — shared CA cert (relative to where your script runs)
ssl.ca.location=certs/cacerts.pem
schema.registry.ssl.ca.location=certs/cacerts.pem

# Schema auto-registration (set to false in production)
auto.register.schemas=true
