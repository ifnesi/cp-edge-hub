apiVersion: platform.confluent.io/v1beta1
kind: ControlCenter
metadata:
  name: controlcenter
  namespace: cp-edge
spec:
  replicas: 1

  # Cluster display name shown in the C3 UI.
  name: edge.cluster

  # -------------------------------------------------------------------------
  # Next-generation Control Center (C3++), 2.5.0 — bundles Prometheus +
  # Alertmanager as sidecars and ingests metrics each component publishes via
  # dependencies.metricsClient. Image tags MUST match across all three.
  # -------------------------------------------------------------------------
  image:
    application: docker.io/confluentinc/cp-enterprise-control-center-next-gen:2.5.0
    init: docker.io/confluentinc/confluent-init-container:3.2.0

  dataVolumeCapacity: 50Gi
  storageClass:
    name: gp3

  podTemplate:
    resources:
      requests:
        cpu: "500m"
        memory: 3Gi
      limits:
        cpu: "3"
        memory: 6Gi
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - broker

  # TLS for the C3 web UI (cert SAN *.edge.kafka.demo covers controlcenter.edge.kafka.demo).
  tls:
    secretRef: tls-kafka

  externalAccess:
    type: loadBalancer
    loadBalancer:
      domain: edge.kafka.demo
      port: 9021
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

  # -------------------------------------------------------------------------
  # Bundled metrics backend — Prometheus + Alertmanager (basic auth, internal).
  # -------------------------------------------------------------------------
  services:
    prometheus:
      image: docker.io/confluentinc/cp-enterprise-prometheus:2.5.0
      authentication:
        type: basic
        basic:
          secretRef: prometheus-credentials
      pvc:
        dataVolumeCapacity: 50Gi
    alertmanager:
      image: docker.io/confluentinc/cp-enterprise-alertmanager:2.5.0
      authentication:
        type: basic
        basic:
          secretRef: alertmanager-credentials

  # -------------------------------------------------------------------------
  # Dependencies — Edge cluster management (topics, schemas). No Connect on Edge.
  # -------------------------------------------------------------------------
  dependencies:
    prometheusClient:
      url: http://controlcenter.cp-edge.svc.cluster.local:9090
      authentication:
        type: basic
        basic:
          secretRef: prometheus-client-creds
    alertManagerClient:
      url: http://controlcenter.cp-edge.svc.cluster.local:9093
      authentication:
        type: basic
        basic:
          secretRef: alertmanager-client-creds

    kafka:
      bootstrapEndpoint: kafka.cp-edge.svc.cluster.local:9071
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
      tls:
        enabled: false

    schemaRegistry:
      url: https://schemaregistry.cp-edge.svc.cluster.local:8081
      tls:
        enabled: true
        secretRef: tls-kafka
