apiVersion: platform.confluent.io/v1beta1
kind: ControlCenter
metadata:
  name: controlcenter
  namespace: cp-edge
spec:
  replicas: 1

  # Instance identity — used as the internal-topic prefix (_confluent-controlcenter_<name>),
  # NOT the Kafka cluster display name in the UI.
  name: edge.cluster

  # -------------------------------------------------------------------------
  # Kafka cluster display name in the C3 UI — the <name> token (dot-free) in
  # the property key becomes the tile label. Must match bootstrapEndpoint in
  # dependencies.kafka so C3 renames the existing cluster, not add a second tile.
  # -------------------------------------------------------------------------
  configOverrides:
    server:
      - confluent.controlcenter.kafka.Edge.bootstrap.servers=kafka.cp-edge.svc.cluster.local:9071
      # CFK generates confluent.controlcenter.streams.sasl.* for the Streams connection but
      # omits security settings for the named managed-cluster client (kafka.Edge.*). Without
      # these the Edge admin client defaults to PLAINTEXT, fails SASL handshake on the
      # INTERNAL listener, and the Edge cluster panel is permanently dead (clusterId: null).
      - confluent.controlcenter.kafka.Edge.security.protocol=SASL_PLAINTEXT
      - confluent.controlcenter.kafka.Edge.sasl.mechanism=PLAIN
      - confluent.controlcenter.kafka.Edge.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${file:/mnt/secrets/credential/plain.txt:username}" password="${file:/mnt/secrets/credential/plain.txt:password}";
      # Raise the absolute-floor for disk-skew warnings so C3 and SBC thresholds align.
      # C3 fires at >10% relative variance with no absolute floor by default (1 GB).
      # SBC only acts at >20% relative AND >~20% disk-full — on 1 TiB brokers that's
      # ~200 GB. Setting 10 GB here keeps early-warning sensitivity while suppressing
      # false-positive Criticals at trivial fill levels (currently ~1.7% full).
      - confluent.controlcenter.disk.skew.warning.min.bytes=10737418240

  # -------------------------------------------------------------------------
  # Next-generation Control Center (C3++), 2.5.0 — bundles Prometheus +
  # Alertmanager as sidecars and ingests metrics each component publishes via
  # dependencies.metricsClient. Image tags MUST match across all three.
  # -------------------------------------------------------------------------
  image:
    application: docker.io/confluentinc/cp-enterprise-control-center-next-gen:2.5.0
    init: docker.io/confluentinc/confluent-init-container:3.2.0

  dataVolumeCapacity: 50Gi
  storageClass:
    name: gp3

  podTemplate:
    resources:
      requests:
        cpu: "500m"
        memory: 3Gi
      limits:
        cpu: "3"
        memory: 6Gi
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - broker

  # Dedicated TLS secret — includes the C3 NLB hostname as a SAN so the browser
  # SNI check passes. Created/refreshed by scripts/09-refresh-c3-tls.sh.
  tls:
    secretRef: tls-controlcenter

  externalAccess:
    type: loadBalancer
    loadBalancer:
      domain: edge.kafka.demo
      port: 9021
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

  # -------------------------------------------------------------------------
  # Bundled metrics backend — Prometheus + Alertmanager (basic auth, internal).
  # -------------------------------------------------------------------------
  services:
    prometheus:
      image: docker.io/confluentinc/cp-enterprise-prometheus:2.5.0
      authentication:
        type: basic
        basic:
          secretRef: prometheus-credentials
      pvc:
        dataVolumeCapacity: 50Gi
    alertmanager:
      image: docker.io/confluentinc/cp-enterprise-alertmanager:2.5.0
      authentication:
        type: basic
        basic:
          secretRef: alertmanager-credentials

  # -------------------------------------------------------------------------
  # Dependencies — Edge cluster management (topics, schemas). No Connect on Edge.
  # -------------------------------------------------------------------------
  dependencies:
    prometheusClient:
      url: http://controlcenter.cp-edge.svc.cluster.local:9090
      authentication:
        type: basic
        basic:
          secretRef: prometheus-client-creds
    alertManagerClient:
      url: http://controlcenter.cp-edge.svc.cluster.local:9093
      authentication:
        type: basic
        basic:
          secretRef: alertmanager-client-creds

    kafka:
      bootstrapEndpoint: kafka.cp-edge.svc.cluster.local:9071
      authentication:
        type: plain
        jaasConfig:
          secretRef: credential
      tls:
        enabled: false

    schemaRegistry:
      url: https://schemaregistry.cp-edge.svc.cluster.local:8081
      tls:
        enabled: true
        secretRef: tls-kafka
